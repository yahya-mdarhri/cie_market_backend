name: Django CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: dev

    steps:
      - name: 🧾 Checkout code
        uses: actions/checkout@v3

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'  # adjust to your project's version

      - name: ⚙️ Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: 🔐 Create .env file from GitHub Secrets
        run: |
          export "DJANGO_DEBUG=${{ secrets.DJANGO_DEBUG }}"
          export "ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }}"
          export "DJANGO_SETTINGS_MODULE=${{ secrets.DJANGO_SETTINGS_MODULE }}"
          export "DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}"
          export "DB_HOST=${{ secrets.DB_HOST }}"
          export "DB_PORT=${{ secrets.DB_PORT }}"
          export "DB_NAME=${{ secrets.DB_NAME }}"
          export "DB_USER=${{ secrets.DB_USER }}"
          export "DB_PASSWORD=${{ secrets.DB_PASSWORD }}"
          export "JWT_SECRET=${{ secrets.JWT_SECRET }}"
          export "JWT_ALGORITHM=${{ secrets.JWT_ALGORITHM }}"
          export "JWT_EXP_DELTA_SECONDS=${{ secrets.JWT_EXP_DELTA_SECONDS }}"

      - name: 📦 Run makemigrations
        run: python manage.py makemigrations

      - name: 📦 Run migrations
        run: python manage.py migrate

      - name: 🧪 Run tests
        run: python manage.py test
